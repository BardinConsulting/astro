name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          # Automatically merge the release PR when CI is green
          # Remove the line below to require manual merge
          token: ${{ secrets.GITHUB_TOKEN }}

  # Optional: add post-release steps here (e.g. Docker push, npm publish)
  # post-release:
  #   needs: release-please
  #   if: needs.release-please.outputs.release_created
  #   runs-on: ubuntu-latest
  #   steps:
  #     - run: echo "Released ${{ needs.release-please.outputs.tag_name }}"
